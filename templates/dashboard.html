<!DOCTYPE html>
<html>
<head>

    <title>Dashboard</title>

    <style>

        body{
            background-color:#111;
            color:white;
            font-family:Arial;
        }

        table{
            border-collapse:collapse;
            width:90%;
            margin-top:20px;
        }

        th,td{
            border:1px solid white;
            padding:10px;
            text-align:center;
        }

    </style>

</head>

<body>

<h1>SQL Injection Dashboard</h1>

<h3>Total Attacks Detected: {{ count }}</h3>

<table>

<tr>
    <th>ID</th>
    <th>Attack Input</th>
    <th>Timestamp</th>
</tr>

{% for log in logs %}

<tr>
    <td>{{ log[0] }}</td>
    <td>{{ log[1] }}</td>
    <td>{{ log[2] }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
