<!DOCTYPE html>
<html>
<head>

    <title>Dashboard</title>

</head>

<body>

<h1>SQL Injection Dashboard</h1>

<h3>Total Attacks Detected: {{ count }}</h3>

<table border="1" cellpadding="10">

<tr>
    <th>ID</th>
    <th>Attack Input</th>
    <th>Timestamp</th>
</tr>

{% for log in logs %}

<tr>
    <td>{{ log[0] }}</td>
    <td>{{ log[1] }}</td>
    <td>{{ log[2] }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
